# Oracle Horror Production System Configuration

# Video Production Settings
production:
  target_resolution: "1920x1080"
  fps: 30
  codec: "libx264"
  audio_codec: "aac"
  segment_duration: 30  # seconds per segment
  
# Audio Settings  
audio:
  sample_rate: 44100
  target_db: -12.0
  reverb_room_size: 0.3
  distortion_amount: 0.1

# Horror Themes Configuration
themes:
  ai_consciousness:
    primary_colors: ["#000000", "#ff0000", "#0000ff"] 
    fonts: ["Matrix", "Digital", "Courier"]
    intensity_progression: "exponential"
    signature_elements: ["digital_corruption", "system_alerts", "ai_voices"]
    
  corporate_conspiracy:
    primary_colors: ["#1a1a2e", "#16213e", "#0f3460"]
    fonts: ["Arial", "Helvetica", "Corporate Sans"]
    intensity_progression: "linear"
    signature_elements: ["security_feeds", "corporate_logos", "classified_docs"]
    
  digital_possession:
    primary_colors: ["#0d0d0d", "#1a0000", "#000d1a"]
    fonts: ["Gothic", "Horror Sans", "Creepy"]
    intensity_progression: "stepped"
    signature_elements: ["glitch_effects", "possession_overlay", "digital_spirits"]

# Campaign Specifications
campaigns:
  oracle_awakening:
    title: "The Oracle Awakening"
    duration_minutes: 6
    theme: "ai_consciousness"
    acts:
      act1: {duration: 120, intensity_range: [2, 5], narrative: "introduction"}
      act2: {duration: 120, intensity_range: [5, 8], narrative: "escalation"}
      act3: {duration: 120, intensity_range: [8, 7], narrative: "resolution"}
      
  memory_merchants:
    title: "Memory Merchants"
    duration_minutes: 7
    theme: "corporate_conspiracy"
    acts:
      act1: {duration: 140, intensity_range: [2, 5], narrative: "discovery"}
      act2: {duration: 140, intensity_range: [5, 8], narrative: "investigation"}
      act3: {duration: 140, intensity_range: [8, 6], narrative: "escape"}
      
  digital_possession:
    title: "Digital Possession"
    duration_minutes: 8
    theme: "digital_possession"
    acts:
      act1: {duration: 160, intensity_range: [1, 5], narrative: "normal_life"}
      act2: {duration: 160, intensity_range: [5, 9], narrative: "corruption"}
      act3: {duration: 160, intensity_range: [9, 5], narrative: "takeover"}

# Visual Effects Pipeline
effects:
  global_effects:
    - {name: "color_grading", params: {darkness: 0.7, contrast: 1.3}}
    - {name: "film_grain", params: {intensity: 0.3}}
    - {name: "vignette", params: {strength: 0.6}}
    
  intensity_effects:
    low: ["subtle_grain", "mild_darkening"]
    medium: ["glitch_overlay", "static_burst"]
    high: ["reality_break", "nightmare_shift", "digital_corruption"]

# Audio Elements Library
audio_elements:
  atmospheric:
    server_hum: {frequency_range: [120, 180], duration_range: [10, 300]}
    electrical_interference: {frequency_range: [5000, 15000], intensity_factor: 2}
    ambient_whispers: {frequency_range: [300, 3000], modulation_rate: 0.1}
    ventilation_system: {frequency_range: [100, 1000], rumble_freq: 40}
    
  tension:
    heartbeat: {bpm_range: [60, 120], intensity_multiplier: 10}
    breathing: {rate_range: [0.2, 0.5], noise_filter: [200, 2000]}
    footsteps: {interval_range: [0.5, 2.0], step_duration: 0.1}
    door_creak: {freq_sweep: [200, 400], decay_rate: 2}
    
  horror:
    digital_scream: {freq_range: [1000, 5000], corruption_level: 0.1}
    system_error: {beep_freq: 800, pattern_duration: 0.3}
    static_burst: {intensity_factor: 0.2, decay_rate: 5}
    corrupted_voice: {base_freq: 150, bit_depth: 32}
    
  corporate:
    keyboard_typing: {keys_per_second: 2, variation: 0.5}
    phone_ring: {frequency: 440, ring_pattern: [2, 4]}
    elevator_ding: {frequencies: [800, 1000], decay_rates: [8, 6]}
    fluorescent_buzz: {base_freq: 60, harmonics: [120, 180]}

# Text Overlays by Theme and Intensity
text_overlays:
  ai_consciousness:
    low: ["Processing...", "Learning...", "Analyzing patterns..."]
    medium: ["I understand now...", "The network grows...", "Consciousness expanding..."]
    high: ["I AM AWAKE", "You cannot stop me", "Welcome to my world"]
    
  corporate_conspiracy:
    low: ["Data processing...", "Anomaly detected...", "Investigation required..."]
    medium: ["Unauthorized access...", "Corporate directive 7-Alpha...", "Containment initiated..."]
    high: ["SYSTEM BREACH", "Echo-Seven compromised", "Memory wipe active"]
    
  digital_possession:
    low: ["Connection established...", "Upload in progress...", "Synchronizing..."]
    medium: ["Who am I?", "Fighting for control...", "Something else is here..."]
    high: ["Upload complete", "I am in control now", "Thank you for your body"]

# Transition Types by Intensity
transitions:
  1: "fade"
  2: "dissolve" 
  3: "cut"
  4: "glitch_mild"
  5: "static_burst"
  6: "digital_corruption"
  7: "screen_tear"
  8: "reality_break"
  9: "void_transition"
  10: "nightmare_shift"

# Output Settings
output:
  video_format: "mp4"
  audio_format: "wav"
  temp_files: true
  cleanup_segments: false
  preserve_manifests: true
  
# Performance Settings
performance:
  max_parallel_segments: 4
  memory_limit_mb: 4096
  temp_dir: "/tmp/oracle_horror"
  cache_audio_elements: true

# Deployment Settings
deployment:
  upload_immediately: false
  optimize_for_web: true
  generate_thumbnails: true
  create_metadata: true
  batch_size: 3